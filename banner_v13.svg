<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 400" width="1500" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6F0E6"/>
      <stop offset="55%" stop-color="#EFE6D5"/>
      <stop offset="100%" stop-color="#E8DDC8"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#8A5A3C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8A5A3C" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#A89D90" stroke-width="0.3" opacity="0.3"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.08   0 0 0 0 0.06   0 0 0 0 0.05   0 0 0 0.04 0"/>
    </filter>
  </defs>

  <rect width="1500" height="400" fill="url(#bg)"/>
  <rect width="1500" height="400" fill="url(#grid)" opacity="0.6"/>
  <ellipse cx="750" cy="220" rx="680" ry="200" fill="url(#warmGlow)"/>
  <rect width="1500" height="400" filter="url(#grain)" opacity="0.35"/>

  <!-- Top eyebrow -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="13" letter-spacing="3">
    <text x="80" y="78" fill="#8A847C">MARINGÁ · PR · 🇧🇷</text>
    <text x="1420" y="78" text-anchor="end" fill="#8A5A3C">● OPEN TO REMOTE</text>
  </g>

  <!-- Name -->
  <text x="750" y="210"
        font-family="Playfair Display, Garamond, Georgia, serif"
        font-size="100" font-weight="900"
        fill="#15110E"
        text-anchor="middle"
        letter-spacing="2">VALTER SILVA</text>

  <!-- Hairline divider -->
  <line x1="600" y1="240" x2="900" y2="240" stroke="#8A5A3C" stroke-width="0.8" opacity="0.7"/>
  <circle cx="750" cy="240" r="3" fill="#8A5A3C"/>

  <!-- Role -->
  <text x="750" y="280"
        font-family="JetBrains Mono, Menlo, monospace"
        font-size="20" font-weight="500"
        fill="#2A1D16"
        text-anchor="middle"
        letter-spacing="6">AI AUTOMATION ENGINEER</text>

  <!-- Stack -->
  <text x="750" y="316"
        font-family="JetBrains Mono, Menlo, monospace"
        font-size="13" font-weight="400"
        fill="#8A847C"
        text-anchor="middle"
        letter-spacing="4">n8n  ·  CLAUDE  ·  PYTHON  ·  TYPESCRIPT  ·  POSTGRES</text>

  <!-- Tagline -->
  <text x="750" y="368"
        font-family="Playfair Display, Garamond, Georgia, serif"
        font-style="italic"
        font-size="22" font-weight="500"
        fill="#8A5A3C"
        text-anchor="middle">Na arena, não nas arquibancadas</text>
</svg>
